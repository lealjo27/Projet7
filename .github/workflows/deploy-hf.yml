name: Tests et Déploiement HF

on:
  push:
    branches: [main]

jobs:
  # ─── JOB 1 : Tests ───
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer pytest
        run: pytest -v

  # ─── JOB 2 : Déploiement (seulement si test réussit) ───
  deploy:
    needs: test          # ⬅️ LA CLÉ : attend que "test" passe
    runs-on: ubuntu-latest
    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Purger les Faiss de l'historique
        run: |
          git config user.email "ci@github.com"
          git config user.name "CI"
          git filter-branch --force --index-filter \
            'git rm -r --cached --ignore-unmatch utils/faiss_index' \
            --prune-empty --tag-name-filter cat -- --all

      - name: Pousser vers HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push https://lealjo27:$HF_TOKEN@huggingface.co/spaces/lealjo27/Projet7_Evenementiel main --force
